MOD_CLUBORGANISATION_BIRTHDAY_XML_DESCRIPTION="Displays birthdays of club members (today's and upcoming)."

; Module configuration
MOD_CLUBORGANISATION_BIRTHDAY_DAYS_FUTURE_LABEL="Days ahead"
MOD_CLUBORGANISATION_BIRTHDAY_DAYS_FUTURE_DESC="How many days into the future should upcoming birthdays be shown?"

MOD_CLUBORGANISATION_BIRTHDAY_TITLE_TODAY_LABEL="Heading for \"Today\" section"
MOD_CLUBORGANISATION_BIRTHDAY_TITLE_TODAY_DESC="Custom heading for the today's birthdays section. Leave empty for the default text."
MOD_CLUBORGANISATION_BIRTHDAY_TITLE_UPCOMING_LABEL="Heading for \"Upcoming\" section"
MOD_CLUBORGANISATION_BIRTHDAY_TITLE_UPCOMING_DESC="Custom heading for the upcoming birthdays section. Leave empty for the default text."

MOD_CLUBORGANISATION_BIRTHDAY_SHOW_DAYS_IN_TITLE_LABEL="Show period in heading"
MOD_CLUBORGANISATION_BIRTHDAY_SHOW_DAYS_IN_TITLE_DESC="Appends the number of days in parentheses to the heading of the upcoming birthdays section."

MOD_CLUBORGANISATION_BIRTHDAY_HIDE_TODAY_IF_EMPTY_LABEL="Hide \"Today\" section if empty"
MOD_CLUBORGANISATION_BIRTHDAY_HIDE_TODAY_IF_EMPTY_DESC="Completely hide the today section if nobody has a birthday today."

MOD_CLUBORGANISATION_BIRTHDAY_SHOW_UPCOMING_LABEL="Show upcoming birthdays"
MOD_CLUBORGANISATION_BIRTHDAY_SHOW_UPCOMING_DESC="Show or completely hide the upcoming birthdays section."

MOD_CLUBORGANISATION_BIRTHDAY_HIDE_UPCOMING_IF_EMPTY_LABEL="Hide \"Upcoming\" section if empty"
MOD_CLUBORGANISATION_BIRTHDAY_HIDE_UPCOMING_IF_EMPTY_DESC="Completely hide the upcoming section if nobody has a birthday in the selected period."

MOD_CLUBORGANISATION_BIRTHDAY_SHOW_AGE_LABEL="Show age"
MOD_CLUBORGANISATION_BIRTHDAY_SHOW_AGE_DESC="Displays the new age of the person in parentheses, e.g. \"(turns 42)\"."

; Section titles
MOD_CLUBORGANISATION_BIRTHDAY_TODAY_TITLE="Birthdays today"
MOD_CLUBORGANISATION_BIRTHDAY_UPCOMING_TITLE="Upcoming birthdays (next %d days)"
MOD_CLUBORGANISATION_BIRTHDAY_UPCOMING_TITLE_PLAIN="Upcoming birthdays"
MOD_CLUBORGANISATION_BIRTHDAY_DAYS_SUFFIX="next %d days"

; Empty messages
MOD_CLUBORGANISATION_BIRTHDAY_NONE_TODAY="Nobody has a birthday today."
MOD_CLUBORGANISATION_BIRTHDAY_NONE_UPCOMING="Nobody has a birthday in the next %d days."

; Birthday information
MOD_CLUBORGANISATION_BIRTHDAY_TURNS="(turns %d)"
MOD_CLUBORGANISATION_BIRTHDAY_TOMORROW="tomorrow"
MOD_CLUBORGANISATION_BIRTHDAY_IN_DAYS="in %d days"
